services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: powersync_benchmark_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=10
      - -c
      - max_wal_senders=10
